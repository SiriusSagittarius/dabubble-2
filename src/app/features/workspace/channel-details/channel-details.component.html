<header class="details-header">
  <div class="details-title-group">
    <span class="details-title">Mitglieder</span>
    <span class="details-count">{{ database.activeChannelMembers().length }}</span>
  </div>

  <button
    type="button"
    class="details-close"
    aria-label="Mitglieder schließen"
    (click)="closeDetails()"
  >
    <span class="details-close-icon"></span>
  </button>
</header>

<div class="details-body">
  <div class="members-list-wrapper">
    <div class="members-list">
      @for (member of database.activeChannelMembers(); track member.id) {
        <div class="member-item" (click)="openMemberProfile(member.id)">
          <div class="member-avatar-wrapper">
            <img
              [src]="avatarSvgPath(member.id)"
              [alt]="member.name"
              class="member-avatar"
            />
            @if (member.isOnline) {
              <span class="member-status-dot online" aria-label="Online"></span>
            }
          </div>
          <div class="member-info">
            <span class="member-name">{{ member.name }}</span>
            @if (member.email) {
              <span class="member-email">{{ member.email }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>

  <button class="add-members-button" (click)="onAddMembers()" type="button">
    <img
      src="/assets/icons/add-members-button.svg"
      alt=""
      class="add-members-icon"
    />
    <span class="add-members-text">Mitglieder hinzufügen</span>
  </button>
</div>
