<div class="members-container">
  <header class="members-header">
    <h2 class="members-title">Mitglieder</h2>
    <div class="members-count">{{ members().length }}</div>
  </header>

  <div class="members-list-wrapper">
    <div class="members-list">
      @for (member of members(); track member.id) {
        <div class="member-item">
          <div class="member-avatar-wrapper">
            <img
              [src]="avatarSvgPath(member.id)"
              [alt]="member.name"
              class="member-avatar"
            />
            @if (member.isOnline) {
              <span class="member-status-dot online" aria-label="Online"></span>
            }
          </div>
          <div class="member-info">
            <span class="member-name">{{ member.name }}</span>
            @if (member.email) {
              <span class="member-email">{{ member.email }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>

  <button class="add-members-button" (click)="onAddMembers()" type="button">
    <img src="/assets/icons/person_add.svg" alt="" class="add-members-icon" aria-hidden="true" />
    <span class="add-members-text">Mitglieder hinzufügen</span>
  </button>
</div>
