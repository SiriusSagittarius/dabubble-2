<nav class="channel-list channel-sublist-nested" [attr.aria-label]="label()">
  <button
    type="button"
    class="channel-sublist-toggle channel-sublist-toggle-nested"
    [class.sublist-expanded]="expanded()"
    [attr.aria-expanded]="expanded()"
    (click)="toggle.emit()"
  >
    <svg class="channel-sublist-caret" viewBox="0 5 30 30" width="16" height="16" aria-hidden="true">
      <path d="M17.875 20.8752L14.625 24.1252C14.2292 24.521 13.7762 24.6093 13.2662 24.3902C12.7554 24.1718 12.5 23.7814 12.5 23.2189V16.7814C12.5 16.2189 12.7554 15.8285 13.2662 15.6102C13.7762 15.391 14.2292 15.4793 14.625 15.8752L17.875 19.1252C18 19.2502 18.0937 19.3856 18.1562 19.5314C18.2187 19.6773 18.25 19.8335 18.25 20.0002C18.25 20.1668 18.2187 20.3231 18.1562 20.4689C18.0937 20.6148 18 20.7502 17.875 20.8752Z"/>
    </svg>
    <span class="channel-sublist-label">{{ label() }}</span>
    <span class="channel-sublist-count">{{ channels().length }}</span>
  </button>

  @if (expanded()) {
    @for (channel of channels(); track channel.id) {
      <a
        href="#"
        class="channel-item"
        [class.active]="isActive(channel.id)"
        (click)="selectChannel.emit(channel.id); $event.preventDefault()"
      >
        @if (channel.isPrivate) {
          <span class="channel-private-icon" aria-label="Privat">🔒</span>
        } @else {
          <span class="channel-item-prefix" aria-hidden="true">#</span>
        }
        <span class="channel-item-name">{{ channel.name }}</span>
      </a>
    }
    @if (channels().length === 0) {
      <p class="channel-empty-hint">{{ emptyHint() || 'Keine Channels' }}</p>
    }
  }
</nav>
