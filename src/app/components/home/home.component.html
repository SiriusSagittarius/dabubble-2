<main class="page">
  <app-header></app-header>

  <div class="main-layout">
    <aside class="sidebar-wrapper" [class.collapsed]="sidebarCollapsed()" aria-label="Seitenmenü">
      <app-sidebar></app-sidebar>
    </aside>

    <section
      class="chat-wrapper center-panel"
      [class.center-panel-expanded]="sidebarCollapsed()"
      [class.center-panel-thread-collapsed]="threadCollapsed()"
      [class.center-panel-main-chat]="showMainChatIntro()"
      [class.center-panel-direct-message]="!!selectedDirectMessageUserId()"
      [class.center-panel-todo]="showTodoList()"
      aria-label="Hauptbereich"
    >
      <app-chat-area (threadOpen)="openThread()"></app-chat-area>
    </section>

    <aside
      class="thread-wrapper"
      [class.collapsed]="threadCollapsed()"
      [class.right-panel-main-chat-hidden]="showMainChatIntro()"
      aria-label="Thread"
    >
      <app-thread-panel (close)="closeThread()"></app-thread-panel>
    </aside>
  </div>

  <button
    type="button"
    class="workspace-menu-close-button"
    [class.collapsed]="sidebarCollapsed()"
    aria-label="Workspace-Menü umschalten"
    (click)="toggleSidebar()"
  >
    <img src="../../assets/icons/menu.svg" class="menu-icon" alt="Menü-Icon">
  </button>

  <app-modals-container></app-modals-container>
</main>
